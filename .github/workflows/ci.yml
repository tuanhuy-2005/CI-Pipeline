name: CI Pipeline

on:
  push:
    branches: [ main ]

jobs:
  api-test:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install Newman
        run: npm install -g newman

      - name: Start API
        run: |
          docker compose up -d

      - name: Wait for API to start
        run: sleep 15

      - name: Run Postman Collection
        run: |
          newman run S2O-Test-full-api.postman_collection.json \
          -e "S2O.postman_environment (1).json"
