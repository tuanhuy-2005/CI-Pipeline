name: API CI Pipeline (FastAPI)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  api-test:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2️⃣ Setup Python
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.11

      # 3️⃣ Install Python dependencies
      - name: Install Python dependencies
        run: |
          cd s2o-api
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 4️⃣ Setup Node.js + Newman
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Install Newman + HTML reporter
        run: npm install -g newman newman-reporter-html

      # 5️⃣ Start FastAPI server in background
      - name: Start FastAPI server
        run: |
          cd s2o-api
          uvicorn app.main:app --host 0.0.0.0 --port 8000 &
          echo "Waiting for server to start..."
          sleep 5   # Chờ server khởi động

      # 6️⃣ Debug: list files
      - name: List project files
        run: ls -la s2o-api

      # 7️⃣ Run Newman tests
      - name: Run API Tests
        run: |
          cd s2o-api
          newman run "S2O-Test-full-api.postman_collection.json" \
          -e "S2O.postman_environment (1).json" \
          -r cli,html \
          --reporter-html-export report.html \
          --verbose

      # 8️⃣ Upload HTML report (luôn upload dù fail)
      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: newman-report
          path: s2o-api/report.html
