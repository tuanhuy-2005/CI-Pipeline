name: API CI Pipeline (FastAPI + Newman)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  api-test:
    name: Run API Tests
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout source code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2️⃣ Setup Python
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.12  # nâng lên 3.12 để tránh lỗi package yêu cầu

      # 3️⃣ Install Python dependencies (bỏ pywin32 trên Linux)
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          # Loại pywin32 nếu trên Linux
          if [[ "$RUNNER_OS" != "Windows" ]]; then
            sed '/^pywin32/d' requirements.txt > requirements_clean.txt
            pip install --upgrade -r requirements_clean.txt
          else
            pip install --upgrade -r requirements.txt
          fi

      # 4️⃣ Setup Node.js + Newman
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Newman + HTML reporter
        run: npm install -g newman newman-reporter-html

      # 5️⃣ Start FastAPI server
      - name: Start FastAPI server
        run: |
          uvicorn app.main:app --host 0.0.0.0 --port 8000 &
          echo "Waiting for server to start..."
          sleep 5

      # 6️⃣ Debug: list files
      - name: List project files
        run: ls -la

      # 7️⃣ Run Newman tests
      - name: Run API Tests
        run: |
          newman run "S2O-Test-full-api.postman_collection.json" \
          -e "S2O.postman_environment (1).json" \
          -r cli,html \
          --reporter-html-export report.html \
          --verbose

      # 8️⃣ Upload HTML report
      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: newman-report
          path: report.html
